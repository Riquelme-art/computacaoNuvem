<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagina Secundaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0c1222;
        --accent: #38bdf8;
        --accent-strong: #0ea5e9;
        --text: #e8eef8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #172554, var(--bg-deep));
        color: var(--text);
        font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .container {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0 0 1.25rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.9rem 1.6rem;
        font-size: 1rem;
        font-weight: 700;
        color: #0c1222;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        border: none;
        border-radius: 999px;
        text-decoration: none;
        box-shadow: 0 10px 28px rgba(14, 165, 233, 0.35);
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Pagina Secundaria</h1>
      <a class="btn" href="index.html">Voltar para a pagina inicial</a>
    </main>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagina Secundaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #151515;
        --text: #f2f2f2;
        --border: rgba(200, 200, 200, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #4a4a4a, var(--bg-deep));
        color: var(--text);
        font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .container {
        text-align: center;
        padding: 2rem;
        width: min(100%, 760px);
      }

      .menu-nav {
        margin: 0 auto 1.25rem;
        width: min(100%, 280px);
      }

      .menu-nav label {
        display: block;
        margin-bottom: 0.45rem;
        color: #d0d0d0;
        font-size: 0.9rem;
      }

      .menu-nav select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(35, 35, 35, 0.9);
        color: var(--text);
        font: inherit;
      }

      h1 {
        margin: 0 0 1.25rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      .upload-card {
        margin: 1.25rem auto 0;
        width: min(100%, 520px);
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(28, 28, 28, 0.78);
        padding: 1rem;
      }

      .upload-card p {
        margin: 0 0 0.9rem;
        color: #d6d6d6;
      }

      .file-input {
        display: none;
      }

      .btn-file {
        display: inline-block;
        padding: 0.65rem 1.1rem;
        border-radius: 8px;
        border: 1px solid #8e8e8e;
        background: linear-gradient(180deg, #cdcdcd, #9c9c9c);
        color: #111;
        font-weight: 600;
        cursor: pointer;
      }

      .file-name {
        margin-top: 0.85rem;
        font-size: 0.95rem;
        color: #c9c9c9;
      }

      .preview {
        margin: 1rem auto 0;
        width: min(100%, 700px);
        text-align: left;
      }

      .preview h2 {
        margin: 0 0 0.6rem;
        font-size: 1.1rem;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(20, 20, 20, 0.82);
      }

      th,
      td {
        border-bottom: 1px solid rgba(200, 200, 200, 0.18);
        padding: 0.55rem 0.65rem;
        font-size: 0.9rem;
        white-space: nowrap;
      }

      th {
        background: rgba(70, 70, 70, 0.45);
      }

      .msg {
        margin-top: 0.6rem;
        color: #d0d0d0;
        font-size: 0.9rem;
      }

    </style>
  </head>
  <body>
    <main class="container">
      <div class="menu-nav">
        <label for="page-nav">Navegar entre páginas</label>
        <select id="page-nav" onchange="if(this.value) window.location.href=this.value;">
          <option value="index.html">Página inicial</option>
          <option value="secundaria.html" selected>Página secundária</option>
        </select>
      </div>
      <h1>Pagina Secundaria</h1>
      <section class="upload-card" aria-labelledby="titulo-upload">
        <p id="titulo-upload">Selecionar arquivo externo de dados cadastrados</p>
        <label class="btn-file" for="arquivo-dados">Escolher arquivo externo</label>
        <input
          class="file-input"
          type="file"
          id="arquivo-dados"
          accept=".xlsx,.xls,.csv"
        />
        <div class="file-name" id="nome-arquivo">Nenhum arquivo selecionado.</div>
        <div class="msg" id="status-preview">Selecione um arquivo para visualizar os dados.</div>
        <div class="preview" id="preview-dados"></div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
      const inputArquivo = document.getElementById("arquivo-dados");
      const nomeArquivo = document.getElementById("nome-arquivo");
      const previewDados = document.getElementById("preview-dados");
      const statusPreview = document.getElementById("status-preview");

      function renderizarTabela(matriz) {
        if (!matriz || matriz.length === 0) {
          previewDados.innerHTML = "";
          statusPreview.textContent = "O arquivo nao possui dados para mostrar.";
          return;
        }

        const cabecalho = matriz[0] || [];
        const linhas = matriz.slice(1, 101);
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const trHead = document.createElement("tr");

        cabecalho.forEach((coluna, idx) => {
          const th = document.createElement("th");
          th.textContent = String(coluna || "Coluna " + (idx + 1));
          trHead.appendChild(th);
        });

        thead.appendChild(trHead);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        linhas.forEach((linha) => {
          const tr = document.createElement("tr");
          for (let i = 0; i < cabecalho.length; i += 1) {
            const td = document.createElement("td");
            td.textContent = linha[i] === undefined ? "" : String(linha[i]);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        previewDados.innerHTML = "";
        const titulo = document.createElement("h2");
        titulo.textContent = "Pre-visualizacao dos dados";
        const envoltorio = document.createElement("div");
        envoltorio.className = "table-wrap";
        envoltorio.appendChild(table);
        previewDados.appendChild(titulo);
        previewDados.appendChild(envoltorio);
        statusPreview.textContent = "Exibindo ate 100 linhas do arquivo.";
      }

      inputArquivo.addEventListener("change", function () {
        if (this.files && this.files.length > 0) {
          const arquivo = this.files[0];
          nomeArquivo.textContent = "Arquivo selecionado: " + arquivo.name;
          statusPreview.textContent = "Carregando dados...";

          const leitor = new FileReader();
          leitor.onload = function (evento) {
            try {
              const dados = new Uint8Array(evento.target.result);
              const workbook = XLSX.read(dados, { type: "array" });
              const primeiraAba = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[primeiraAba];
              const matriz = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });
              renderizarTabela(matriz);
            } catch (erro) {
              previewDados.innerHTML = "";
              statusPreview.textContent = "Nao foi possivel ler o arquivo selecionado.";
            }
          };
          leitor.readAsArrayBuffer(arquivo);
          return;
        }
        nomeArquivo.textContent = "Nenhum arquivo selecionado.";
        previewDados.innerHTML = "";
        statusPreview.textContent = "Selecione um arquivo para visualizar os dados.";
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Controle de Fluxo de Caixa Simples - gerencie suas entradas e saídas financeiras de forma fácil e rápida." />
  <title>Controle de Fluxo de Caixa Simples</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Fluxo de Caixa</h1>
    <p>Controle suas finanças de forma simples</p>
  </header>

  <main>
    <!-- Resumo financeiro -->
    <section class="resumo" aria-label="Resumo financeiro">
      <div class="card saldo">
        <span class="label">Saldo</span>
        <span class="valor" id="saldo">R$ 0,00</span>
      </div>
      <div class="card entrada">
        <span class="label">Entradas</span>
        <span class="valor" id="total-entradas">R$ 0,00</span>
      </div>
      <div class="card saida">
        <span class="label">Saídas</span>
        <span class="valor" id="total-saidas">R$ 0,00</span>
      </div>
    </section>

    <!-- Formulário -->
    <section class="formulario" aria-label="Nova movimentação">
      <h2>Nova Movimentação</h2>
      <form id="form-movimentacao" novalidate>
        <div class="campo">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Salário, Aluguel..." required />
        </div>
        <div class="campo">
          <label for="valor">Valor (R$)</label>
          <input type="number" id="valor" placeholder="0,00" min="0.01" step="0.01" required />
        </div>
        <div class="campo">
          <label for="data">Data</label>
          <input type="date" id="data" required />
        </div>
        <div class="campo">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="entrada">Entrada (Receita)</option>
            <option value="saida">Saída (Despesa)</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Adicionar</button>
      </form>
      <div id="feedback" class="feedback" role="alert" aria-live="polite"></div>
    </section>

    <!-- Lista de movimentações -->
    <section class="lista" aria-label="Movimentações">
      <h2>Movimentações</h2>
      <ul id="lista-movimentacoes" aria-label="Lista de movimentações">
        <li class="vazio">Nenhuma movimentação registrada.</li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
